<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ReviewPilot</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--light-gray);
            color: var(--dark);
            line-height: 1.6;
        }
        
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: var(--white);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .login-box h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .login-box p {
            color: var(--gray);
            margin-bottom: 24px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .admin-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .orders-section {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
        }
        
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .orders-header h2 {
            font-size: 24px;
        }
        
        .order-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        
        .order-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37,99,235,0.1);
        }
        
        .order-header {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }
        
        .order-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .order-info p {
            color: var(--gray);
            font-size: 14px;
        }
        
        .order-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .meta-item {
            font-size: 14px;
        }
        
        .meta-label {
            color: var(--gray);
            display: block;
        }
        
        .meta-value {
            font-weight: 700;
        }
        
        .order-actions {
            display: grid;
            grid-template-columns: 200px 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        
        select, input[type="url"] {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        select:focus, input[type="url"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-save {
            padding: 10px 20px;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save:hover {
            background: #059669;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-in_progress { background: #dbeafe; color: #1e40af; }
        .status-preview_ready { background: #e0e7ff; color: #4338ca; }
        .status-live { background: #d1fae5; color: #065f46; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid var(--gray);
            color: var(--gray);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .order-header {
                grid-template-columns: 1fr;
            }
            
            .order-actions {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🔐 Admin Login</h1>
            <p>Enter your admin password</p>
            <form id="loginForm">
                <input 
                    type="password" 
                    class="form-input" 
                    id="passwordInput" 
                    placeholder="Password" 
                    required
                    autocomplete="current-password"
                >
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="margin-top: 16px; font-size: 12px; color: var(--gray);">
                Default password: <code style="background: var(--light-gray); padding: 2px 8px; border-radius: 4px;">admin123</code>
            </p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-container" id="adminPanel">
        <div class="header">
            <div>
                <h1>ReviewPilot Admin</h1>
                <p style="color: var(--gray); margin-top: 4px;">Manage your website orders</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inProgressOrders">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="liveOrders">0</div>
                <div class="stat-label">Live</div>
            </div>
        </div>

        <div class="orders-section">
            <div class="orders-header">
                <h2>All Orders</h2>
                <button class="btn" onclick="loadOrders()" style="width: auto; padding: 10px 20px;">
                    🔄 Refresh
                </button>
            </div>
            <div id="ordersContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>Loading orders...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'admin123'; // Change this in production
        let orders = [];

        // Login handling
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('reviewpilot_admin', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadOrders();
            } else {
                alert('Incorrect password');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('reviewpilot_admin') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadOrders();
        }

        function logout() {
            localStorage.removeItem('reviewpilot_admin');
            location.reload();
        }

        async function loadOrders() {
            try {
                const response = await fetch('/.netlify/functions/get-all-orders');
                const data = await response.json();
                
                if (response.ok) {
                    orders = data.orders || [];
                    renderOrders();
                    updateStats();
                } else {
                    showError('Failed to load orders');
                }
            } catch (error) {
                console.error('Load error:', error);
                showError('Failed to load orders: ' + error.message);
            }
        }

        function updateStats() {
            const total = orders.length;
            const pending = orders.filter(o => o.status === 'pending').length;
            const inProgress = orders.filter(o => o.status === 'in_progress').length;
            const live = orders.filter(o => o.status === 'live').length;

            document.getElementById('totalOrders').textContent = total;
            document.getElementById('pendingOrders').textContent = pending;
            document.getElementById('inProgressOrders').textContent = inProgress;
            document.getElementById('liveOrders').textContent = live;
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No orders yet</p>
                    </div>
                `;
                return;
            }

            // Sort by most recent first
            const sortedOrders = [...orders].sort((a, b) => 
                new Date(b.createdAt) - new Date(a.createdAt)
            );

            container.innerHTML = sortedOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-info">
                            <h3>${order.customerName}</h3>
                            <p>${order.customerEmail}</p>
                        </div>
                        <span class="status-badge status-${order.status}">${getStatusText(order.status)}</span>
                    </div>
                    
                    <div class="order-meta">
                        <div class="meta-item">
                            <span class="meta-label">Plan</span>
                            <span class="meta-value">${order.plan.charAt(0).toUpperCase() + order.plan.slice(1)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Delivery</span>
                            <span class="meta-value">${order.deliveryTime}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Order Date</span>
                            <span class="meta-value">${new Date(order.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Order ID</span>
                            <span class="meta-value" style="font-size: 12px;">${order.id}</span>
                        </div>
                    </div>
                    
                    <div class="order-actions">
                        <select id="status-${order.id}" onchange="updateOrder('${order.id}')">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="in_progress" ${order.status === 'in_progress' ? 'selected' : ''}>🔨 In Progress</option>
                            <option value="preview_ready" ${order.status === 'preview_ready' ? 'selected' : ''}>👀 Preview Ready</option>
                            <option value="live" ${order.status === 'live' ? 'selected' : ''}>🎉 Live</option>
                        </select>
                        <input 
                            type="url" 
                            id="preview-${order.id}" 
                            placeholder="Preview URL" 
                            value="${order.previewUrl || ''}"
                        >
                        <input 
                            type="url" 
                            id="live-${order.id}" 
                            placeholder="Live URL" 
                            value="${order.websiteUrl || ''}"
                        >
                    </div>
                    <button class="btn-save" onclick="updateOrder('${order.id}')" style="margin-top: 12px; width: 150px;">
                        💾 Save Changes
                    </button>
                </div>
            `).join('');
        }

        async function updateOrder(orderId) {
            const status = document.getElementById(`status-${orderId}`).value;
            const previewUrl = document.getElementById(`preview-${orderId}`).value;
            const websiteUrl = document.getElementById(`live-${orderId}`).value;

            try {
                const response = await fetch('/.netlify/functions/update-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId,
                        status,
                        previewUrl: previewUrl || null,
                        websiteUrl: websiteUrl || null
                    })
                });

                if (response.ok) {
                    alert('✅ Order updated successfully!');
                    loadOrders();
                } else {
                    throw new Error('Update failed');
                }
            } catch (error) {
                console.error('Update error:', error);
                alert('❌ Failed to update order');
            }
        }

        function getStatusText(status) {
            const statuses = {
                'pending': '⏳ Pending',
                'in_progress': '🔨 In Progress',
                'preview_ready': '👀 Preview Ready',
                'live': '🎉 Live'
            };
            return statuses[status] || status;
        }

        function showError(message) {
            document.getElementById('ordersContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
