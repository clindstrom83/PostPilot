<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account | ReviewPilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .signup-container {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .logo p {
            color: var(--gray);
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .submit-button {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .submit-button:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
        }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            color: var(--gray);
            font-size: 14px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--gray);
            font-size: 14px;
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            display: none;
        }
        
        .success-message {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #059669;
            font-size: 14px;
            display: none;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
            color: var(--gray);
        }
        
        .password-strength.weak { color: #ef4444; }
        .password-strength.medium { color: #f59e0b; }
        .password-strength.strong { color: #10b981; }
        
        @media (max-width: 768px) {
            .signup-container {
                padding: 32px 20px;
            }
            
            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <h1>ReviewPilot</h1>
            <p>Create your account</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="signup-form">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" name="name" id="name" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" name="email" id="email" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" name="password" id="password" required placeholder="Choose a strong password" minlength="8">
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            
            <button type="submit" class="submit-button" id="submitButton">
                Create Account & Continue →
            </button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login.html">Log in</a>
        </div>
        
        <div class="login-link" style="margin-top: 16px;">
            <a href="/index.html">← Back to home</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('signup-form');
        const passwordInput = document.getElementById('password');
        const passwordStrength = document.getElementById('passwordStrength');
        const submitButton = document.getElementById('submitButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = '';
            let className = '';
            
            if (password.length === 0) {
                passwordStrength.textContent = '';
                return;
            }
            
            if (password.length < 8) {
                strength = 'Too short (min 8 characters)';
                className = 'weak';
            } else if (password.length < 12 && !/[0-9]/.test(password)) {
                strength = 'Weak - add numbers';
                className = 'weak';
            } else if (password.length < 12) {
                strength = 'Medium - make it longer';
                className = 'medium';
            } else {
                strength = 'Strong password ✓';
                className = 'strong';
            }
            
            passwordStrength.textContent = strength;
            passwordStrength.className = `password-strength ${className}`;
        });
        
        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Hide messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Disable button
            submitButton.disabled = true;
            submitButton.textContent = 'Creating account...';
            
            try {
                const response = await fetch('/.netlify/functions/auth-signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Save session
                    localStorage.setItem('reviewpilot_session', data.sessionToken);
                    localStorage.setItem('reviewpilot_email', email);
                    localStorage.setItem('reviewpilot_name', name);
                    
                    // Show success
                    successMessage.textContent = '✓ Account created! Redirecting to plans...';
                    successMessage.style.display = 'block';
                    
                    // Redirect to plans page
                    setTimeout(() => {
                        window.location.href = '/plans.html';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Failed to create account');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                submitButton.disabled = false;
                submitButton.textContent = 'Create Account & Continue →';
            }
        });
    </script>
</body>
</html>
