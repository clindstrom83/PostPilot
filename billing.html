<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Your Billing - ReviewPilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .billing-container {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .logo p {
            color: var(--gray);
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .submit-button {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .submit-button:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            text-align: center;
            color: var(--gray);
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .billing-container {
                padding: 32px 20px;
                border-radius: 16px;
            }
            
            .logo h1 {
                font-size: 28px;
            }
            
            .logo p {
                font-size: 15px;
            }
            
            .form-input {
                padding: 16px;
                font-size: 16px;
            }
            
            .submit-button {
                padding: 18px;
                font-size: 19px;
            }
        }
        
        @media (max-width: 400px) {
            body {
                padding: 12px;
            }
            
            .billing-container {
                padding: 24px 16px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="billing-container">
        <div class="logo">
            <h1>ReviewPilot</h1>
            <p>Manage Your Billing</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="billingForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input 
                    type="email" 
                    class="form-input" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="you@example.com"
                    autocomplete="email"
                >
            </div>
            
            <button type="submit" class="submit-button" id="submitBtn">
                Access Billing Portal →
            </button>
        </form>
        
        <p class="info-text">
            Enter the email address associated with your ReviewPilot account. 
            You'll be redirected to a secure portal where you can view invoices, 
            update your payment method, or cancel your subscription.
        </p>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    
    <script>
        // Check for success parameter (returned from portal)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'true') {
            showAlert('You\'re all set! Your billing changes have been saved.', 'success');
        }
        
        // Handle form submission
        document.getElementById('billingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Loading...';
            
            try {
                const response = await fetch('/.netlify/functions/create-portal-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }
                
                // Redirect to Stripe billing portal
                window.location.href = data.url;
                
            } catch (error) {
                console.error('Error:', error);
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Access Billing Portal →';
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
