<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ReviewPilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --dark: #0f172a;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .logo p {
            color: var(--gray);
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .submit-button {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .submit-button:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            text-align: center;
            color: var(--gray);
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .login-container {
                padding: 32px 20px;
                border-radius: 16px;
            }
            
            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>ReviewPilot</h1>
            <p>Customer Dashboard</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="loginForm" style="display:block;">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input 
                    type="email" 
                    class="form-input" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="you@example.com"
                    autocomplete="email"
                >
            </div>
            
            <button type="submit" class="submit-button" id="submitBtn">
                Send Login Link →
            </button>
        </form>
        
        <div id="successMessage" style="display:none;text-align:center;padding:32px;">
            <div style="font-size:64px;margin-bottom:16px;">📧</div>
            <h2 style="font-size:24px;margin-bottom:12px;color:var(--dark);">Check Your Email</h2>
            <p style="color:var(--gray);line-height:1.6;">
                We've sent a login link to <strong id="sentEmail"></strong>.<br><br>
                Click the link in your email to access your dashboard.<br>
                The link expires in 15 minutes.
            </p>
        </div>
        
        <p class="info-text">
            Enter the email address you used when signing up. 
            We'll send you a secure login link.
        </p>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch('/.netlify/functions/send-login-link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send login link');
                }
                
                // Show success message
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('sentEmail').textContent = email;
                
                // For MVP: also show the link (remove in production)
                if (data.loginUrl) {
                    console.log('Login link:', data.loginUrl);
                    // Auto-redirect after 2 seconds in development
                    setTimeout(() => {
                        window.location.href = data.loginUrl;
                    }, 2000);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Login Link →';
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
